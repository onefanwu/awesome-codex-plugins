name: Alphabetical Order Check

on:
  pull_request:
    paths:
      - "README.md"

jobs:
  alphabetical:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 scripts/check-alphabetical.py README.md
